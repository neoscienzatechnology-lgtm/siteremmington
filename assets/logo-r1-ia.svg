<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 180" role="img" aria-labelledby="title desc">
  <title id="title">R1 Remington IA</title>
  <desc id="desc">Logotipo R1 Remington IA com gradiente azul e roxo.</desc>
  <defs>
    <linearGradient id="r1Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B84DFF"/>
      <stop offset="45%" stop-color="#5A5CFF"/>
      <stop offset="100%" stop-color="#4CCBFF"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9B40FF"/>
      <stop offset="100%" stop-color="#4CCBFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(20 18)" fill="none" stroke="url(#r1Grad)" stroke-width="10" filter="url(#glow)">
    <path d="M10 20h120c20 0 34 12 34 30 0 20-14 33-34 33H66l78 72h-49L20 84h89c9 0 15-5 15-12s-6-12-15-12H10z"/>
    <path d="M184 20h52l-56 135h-43z"/>
    <path d="M224 20h42v135h-42z"/>
  </g>

  <text x="300" y="82" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="8" fill="#F4F7FF">REMINGTON</text>
  <text x="704" y="82" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="url(#r1Grad)">IA</text>
  <text x="301" y="122" font-family="Inter, Arial, sans-serif" font-size="23" letter-spacing="7" fill="#B5BED6">ENSINO DE TECNOLOGIA</text>

  <rect x="300" y="133" width="180" height="4" rx="2" fill="url(#lineGrad)"/>
  <rect x="610" y="133" width="130" height="4" rx="2" fill="url(#lineGrad)"/>
</svg>
